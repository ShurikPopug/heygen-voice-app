name: Build macOS App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install nuitka requests pyperclip imageio

    - name: Build with Nuitka
      run: |
        python -m nuitka \
          --standalone \
          --enable-plugin=tk-inter \
          --macos-create-app-bundle \
          --macos-app-icon=icon.png \
          --include-data-files=voices.json=voices.json \
          --include-data-files=icon.png=icon.png \
          main.py

    - name: Pack app bundle correctly
      run: |
        ditto -c -k --sequesterRsrc --keepParent "main.app" "HeyGenVoiceGenerator_macOS_app.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: macos-app
        path: HeyGenVoiceGenerator_macOS_app.zip
